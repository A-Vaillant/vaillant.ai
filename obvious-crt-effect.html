<!DOCTYPE html>
<html>
  <head>
    <title>vaillant.ai</title>
    <meta name="description" content="If you're looking for A. Vaillant's website, this is it. You've found it - it's simply a matter of clicking the link.">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="portfolio.css">
  </head>
  <body>
    <div class="crt">
      <div class="scan-line"></div>
      <div class="scan-line" style="animation-delay: -2s;"></div>
      <div class="scan-line" style="animation-delay: -4s;"></div>
      <div id="curved-screen">
        <div id="central">
          <h1 id="name">Aleister Vaillant</h1>
          <a class="subtitle" href="mailto:aleister@vaillant.ai">aleister@vaillant.ai</a>
          <h2><a href="https://www.linkedin.com/in/alvaillant/">LinkedIn</a></h2>
          <h2><a href="https://github.com/A-Vaillant">GitHub</a></h2>
          
          <div id="filesystem">
            <div class="folder">
              <div class="folder-header">
                <span class="folder-icon">▶</span>
                <span class="folder-name">projects/</span>
              </div>
              <div class="folder-content">
                <!-- Projects will be dynamically inserted here -->
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const projects = [
        {
          name: "factorio-working-ground-iteration-1",
          description: "An investigation into the application of convolutional neural networks towards automating factory creation through Factorio.",
          type: "Research Project",
          modified: "2024-05-19",
          link: "https://github.com/A-Vaillant/factorio-working-group-1"
        },
        {
          name: "negative-qwop",
          description: "Made for the Stupid Hackathon 2025 at NYU's ISB dept. Solving going backwards in QWOP. Ended up hitting a wall.",
          type: "Reinforcement Learning",
          modified: "2024-05-10",
          link: "#"
        },
        {
          name: "petrock",
          description: "A Raspberry Pi-able visual LLM + chatbot combination. Can look at pictures (including taken from a camera) and make comments nicely or rudely.",
          type: "Large Language Models",
          modified: "2024-05-01",
          link: "https://github.com/A-Vaillant/petrock"
        }
      ];

      document.querySelectorAll('.folder-header').forEach(header => {
        header.addEventListener('click', () => {
          const folder = header.parentElement;
          folder.classList.toggle('open');
        });
      });

      function renderProjects() {
        const folderContent = document.querySelector('.folder-content');
        folderContent.innerHTML = projects.map(project => `
          <div class="file" onclick="window.location.href='${project.link}'">
            <span class="file-icon">📄</span>
            <span class="file-name">${project.name}</span>
            <span class="file-meta">${project.type} | ${project.modified}</span>
          </div>
        `).join('');
      }

      renderProjects();
    </script>
  </body>
</html>
